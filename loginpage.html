<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
            background:#f4f4f4;
        }
        .login-box{
            padding:30px;
            background:white;
            box-shadow:0 0 10px gray;
            border-radius:10px;
        }
        input{
            display:block;
            margin:10px 0;
            padding:10px;
            width:250px;
        }
        button{
            padding:10px;
            width:100%;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>
</body>
</html>
